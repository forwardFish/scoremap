  <text x="56" y="270" font-size="14" font-weight="700" fill="#111827">Knowledge diagnosis</text><text x="56" y="292" font-size="11" fill="#4b5563">Calculation rules and formula usage need staged practice.</text><text x="56" y="350" font-size="14" font-weight="700" fill="#111827">Per-question loss point breakdown</text><text x="56" y="372" font-size="11" fill="#4b5563">Mark the missing condition, formula, solving process, and final verification.</text><text x="56" y="430" font-size="14" font-weight="700" fill="#111827">7-day score improvement plan</text><text x="56" y="452" font-size="11" fill="#4b5563">Three correction reviews, two targeted exercise days, and one final mistake-book review.</text><text x="56" y="510" font-size="14" font-weight="700" fill="#111827">Parent guidance</text><text x="56" y="532" font-size="11" fill="#4b5563">Use process feedback and avoid guaranteed-score promises.</text>
  <text x="56" y="602" font-size="11" fill="#6b7280">Local mock report only. No guaranteed-score promise is displayed.</text>
