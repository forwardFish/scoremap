<svg xmlns="urn:scoremap:local-svg" width="390" height="844" viewBox="0 0 390 844">  <rect width="390" height="844" fill="#f5f7fb"/>  <text x="28" y="72" font-size="23" font-weight="700" fill="#111827">完整提分报告</text>  <rect x="30" y="128" width="76" height="30" rx="14" fill="#ffffff" stroke="#d1d5db"/><text x="39" y="148" font-size="10" fill="#374151">overview</text><rect x="114" y="128" width="76" height="30" rx="14" fill="#ffffff" stroke="#d1d5db"/><text x="123" y="148" font-size="10" fill="#374151">loss points</text><rect x="198" y="128" width="76" height="30" rx="14" fill="#ffffff" stroke="#d1d5db"/><text x="207" y="148" font-size="10" fill="#374151">7-day plan</text><rect x="282" y="128" width="76" height="30" rx="14" fill="#ffffff" stroke="#d1d5db"/><text x="291" y="148" font-size="10" fill="#374151">parent guidance</text>  <rect x="28" y="178" width="334" height="456" rx="6" fill="#fffaf0" stroke="#d6d3d1"/>  <text x="56" y="224" font-size="20" font-weight="700" fill="#111827">初一数学月考提分报告</text>  <text x="56" y="250" font-size="12" fill="#6b7280">整体基础较好，计算粗心和几何证明步骤不完整是本次失分的主要原因。</text>  <text x="56" y="270" font-size="14" font-weight="700" fill="#111827">主要丢分点</text><text x="56" y="292" font-size="11" fill="#4b5563">计算失误、几何证明步骤缺失、应用题等量关系不清。</text><text x="56" y="350" font-size="14" font-weight="700" fill="#111827">优先补弱顺序</text><text x="56" y="372" font-size="11" fill="#4b5563">先补几何证明表达，再巩固方程应用题和计算检查。</text><text x="56" y="430" font-size="14" font-weight="700" fill="#111827">7 天建议</text><text x="56" y="452" font-size="11" fill="#4b5563">每天 20 分钟错题复盘，隔天完成同类题迁移练习。</text><text x="56" y="510" font-size="14" font-weight="700" fill="#111827">家长陪伴建议</text><text x="56" y="532" font-size="11" fill="#4b5563">关注孩子是否能讲清思路，不用分数承诺替代过程反馈。</text>  <text x="56" y="602" font-size="11" fill="#6b7280">内容仅供学习参考，请结合课堂学习与老师建议使用。</text>  <rect x="28" y="668" width="104" height="46" rx="18" fill="#f8fafc" stroke="#d1d5db"/>  <text x="58" y="697" font-size="12" fill="#111827">Save</text>  <rect x="144" y="668" width="104" height="46" rx="18" fill="#2563eb"/>  <text x="166" y="697" font-size="12" fill="#ffffff">PDF</text>  <rect x="260" y="668" width="104" height="46" rx="18" fill="#f8fafc" stroke="#d1d5db"/>  <text x="292" y="697" font-size="12" fill="#111827">Back</text></svg>