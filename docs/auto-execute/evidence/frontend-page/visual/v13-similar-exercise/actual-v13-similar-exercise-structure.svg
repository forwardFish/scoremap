<svg xmlns="urn:scoremap:local-svg" width="390" height="844" viewBox="0 0 390 844">  <rect width="390" height="844" fill="#fdf8ff"/>  <text x="54" y="58" font-size="20" font-weight="800" fill="#5a45cb">同类练习</text>  <rect x="18" y="92" width="354" height="444" rx="24" fill="#ffffff" stroke="#ebe6f2"/>  <text x="42" y="132" font-size="12" font-weight="700" fill="#5a45cb">围绕当前错题生成，不进入开放聊天。</text>  <text x="42" y="178" font-size="20" font-weight="800" fill="#1c1b23">甲每小时行 72km，乙每小时行 60km，3 小时后甲比乙多行多少千米？</text>  <rect x="32" y="276" width="326" height="50" rx="16" fill="#ffffff" stroke="#d8d0f0"/>  <text x="54" y="308" font-size="13" font-weight="700" fill="#5a45cb">A.</text>  <text x="86" y="308" font-size="13" fill="#1c1b23">24 千米</text><rect x="32" y="344" width="326" height="50" rx="16" fill="#ffffff" stroke="#d8d0f0"/>  <text x="54" y="376" font-size="13" font-weight="700" fill="#5a45cb">B.</text>  <text x="86" y="376" font-size="13" fill="#1c1b23">36 千米</text><rect x="32" y="412" width="326" height="50" rx="16" fill="#ffffff" stroke="#d8d0f0"/>  <text x="54" y="444" font-size="13" font-weight="700" fill="#5a45cb">C.</text>  <text x="86" y="444" font-size="13" fill="#1c1b23">132 千米</text><rect x="32" y="480" width="326" height="50" rx="16" fill="#ffffff" stroke="#d8d0f0"/>  <text x="54" y="512" font-size="13" font-weight="700" fill="#5a45cb">D.</text>  <text x="86" y="512" font-size="13" fill="#1c1b23">216 千米</text>  <rect x="18" y="560" width="354" height="104" rx="22" fill="#f7f1fd" stroke="#ebe6f2"/>  <text x="42" y="594" font-size="15" font-weight="800" fill="#1c1b23">原错题上下文</text>  <text x="42" y="624" font-size="12" fill="#474554">没有先判断两人的速度差，导致数量关系跑偏。</text>  <rect x="18" y="694" width="354" height="54" rx="18" fill="#5a45cb"/>  <text x="158" y="728" font-size="15" font-weight="800" fill="#ffffff">提交答案</text>  <rect x="0" y="776" width="390" height="68" fill="#ffffff" stroke="#ebe6f2"/>  <text x="54" y="818" font-size="12" fill="#777383">报告</text>  <text x="170" y="818" font-size="12" font-weight="800" fill="#5a45cb">AI 提分</text>  <text x="294" y="818" font-size="12" fill="#777383">原错题</text></svg>