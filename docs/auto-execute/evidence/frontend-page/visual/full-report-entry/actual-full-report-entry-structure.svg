<svg xmlns="urn:scoremap:local-svg" width="390" height="844" viewBox="0 0 390 844">  <rect width="390" height="844" fill="#f5f7fb"/>  <text x="28" y="72" font-size="23" font-weight="700" fill="#111827">Complete score improvement report</text>  <text x="28" y="106" font-size="13" fill="#6b7280">The 9.9 yuan local mock payment has generated the complete report.</text>  <rect x="28" y="132" width="334" height="62" rx="16" fill="#eef7ff" stroke="#bfdbfe"/>  <text x="48" y="170" font-size="17" font-weight="700" fill="#111827">Complete report generated</text>  <rect x="36" y="208" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="234" font-size="13" font-weight="700" fill="#111827">1. 主要丢分点</text><text x="56" y="254" font-size="11" fill="#6b7280">计算失误、几何证明步骤缺失、应用题等量关系不清。</text><rect x="36" y="278" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="304" font-size="13" font-weight="700" fill="#111827">2. 优先补弱顺序</text><text x="56" y="324" font-size="11" fill="#6b7280">先补几何证明表达，再巩固方程应用题和计算检查。</text><rect x="36" y="348" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="374" font-size="13" font-weight="700" fill="#111827">3. 7 天建议</text><text x="56" y="394" font-size="11" fill="#6b7280">每天 20 分钟错题复盘，隔天完成同类题迁移练习。</text><rect x="36" y="418" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="444" font-size="13" font-weight="700" fill="#111827">4. 家长陪伴建议</text><text x="56" y="464" font-size="11" fill="#6b7280">关注孩子是否能讲清思路，不用分数承诺替代过程反馈。</text>  <rect x="28" y="642" width="334" height="52" rx="20" fill="#2563eb"/>  <text x="118" y="675" font-size="16" font-weight="700" fill="#ffffff">View paper report</text>  <rect x="28" y="712" width="160" height="44" rx="18" fill="#f8fafc" stroke="#d1d5db"/>  <text x="73" y="740" font-size="13" fill="#111827">Save</text>  <rect x="202" y="712" width="160" height="44" rx="18" fill="#f8fafc" stroke="#d1d5db"/>  <text x="250" y="740" font-size="13" fill="#111827">Home</text></svg>