<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>home</title>
  <style>
    html, body { width: 390px; min-height: 844px; margin: 0; overflow: hidden; background: #fff; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    img { max-width: 100%; }
    body {
  min-height: 100%;
  background: #f8f9fe;
}

button {
  margin: 0;
  padding: 0;
  border: 0;
  background: transparent;
  color: inherit;
  font: inherit;
  line-height: inherit;
  text-align: left;
}

button::after {
  border: 0;
}

.home-page {
  position: relative;
  width: 390px;
  min-height: 844px;
  overflow: hidden;
  background: #f8f9fe;
  color: #333333;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}

.home-header {
  height: 104px;
  padding: 48px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-sizing: border-box;
  position: relative;
  z-index: 3;
}

.brand {
  display: flex;
  align-items: center;
  gap: 11px;
}

.brand-icon-wrap {
  position: relative;
  width: 40px;
  height: 40px;
  border-radius: 20px;
  background: #5a6eed;
  box-shadow: 0 4px 14px rgba(90, 110, 237, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand-icon {
  display: none;
}

.brand-icon-wrap::before {
  content: "";
  width: 21px;
  height: 12px;
  border-radius: 8px;
  background: #1d2b82;
}

.brand-icon-wrap::after {
  content: "";
  position: absolute;
  left: 13px;
  top: 16px;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #e9f2ff;
  box-shadow: 7px 0 0 #e9f2ff, 12px 4px 0 -1px #8bd4ff;
}

.brand-title {
  color: #202433;
  font-size: 20px;
  line-height: 28px;
  font-weight: 800;
}

.icon-button {
  position: relative;
  width: 40px;
  height: 40px;
  border-radius: 20px;
  background: #ffffff;
  box-shadow: 0 4px 14px rgba(65, 73, 112, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
}

.icon-button::before {
  content: "";
  width: 18px;
  height: 14px;
  border: 2px solid #8a6cf2;
  border-radius: 10px;
  box-sizing: border-box;
}

.icon-button::after {
  content: "";
  position: absolute;
  left: 15px;
  top: 18px;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #8a6cf2;
  box-shadow: 5px 0 0 #8a6cf2, 10px 0 0 #8a6cf2;
}

.chat-icon {
  display: none;
}

.home-scroll {
  height: 740px;
  padding: 0 20px 96px;
  box-sizing: border-box;
}

.hero-card,
.recent-card {
  background: #ffffff;
  border-radius: 24px;
  box-shadow: 0 4px 16px rgba(138, 108, 242, 0.08);
  box-sizing: border-box;
}

.hero-card {
  position: relative;
  min-height: 371px;
  padding: 32px 24px 24px;
  margin-bottom: 16px;
  overflow: hidden;
}

.hero-glow {
  position: absolute;
  right: -64px;
  top: -77px;
  width: 304px;
  height: 304px;
  border-radius: 152px;
  background: radial-gradient(circle, rgba(161, 138, 245, 0.24) 0%, rgba(161, 138, 245, 0.1) 45%, rgba(255, 255, 255, 0) 74%);
  filter: blur(18px);
}

.hero-top {
  position: relative;
  min-height: 166px;
  z-index: 1;
}

.hero-copy {
  width: 60%;
  position: relative;
  z-index: 2;
}

.hero-title {
  display: block;
  color: #242637;
  font-size: 26px;
  line-height: 33px;
  font-weight: 900;
}

.hero-ai,
.price-highlight {
  color: #8a6cf2;
}

.hero-subtitle {
  margin-top: 12px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 3px;
  color: #888888;
  font-size: 12px;
  line-height: 18px;
  white-space: nowrap;
}

.hero-owl {
  position: absolute;
  right: -20px;
  top: -30px;
  width: 160px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  background: radial-gradient(circle at center, rgba(138, 108, 242, 0.15) 0%, rgba(138, 108, 242, 0) 70%);
}

.owl-cap {
  position: absolute;
  top: 28px;
  left: 63px;
  width: 42px;
  height: 18px;
  background: #322083;
  transform: rotate(-12deg) skewX(-18deg);
  border-radius: 3px;
  z-index: 4;
}

.owl-cap::after {
  content: "";
  position: absolute;
  right: 0;
  bottom: -14px;
  width: 2px;
  height: 18px;
  background: #322083;
}

.owl-body {
  position: absolute;
  left: 40px;
  top: 56px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #e9ddff;
  border: 4px solid #ffffff;
  box-shadow: inset 0 0 12px rgba(87, 53, 181, 0.1);
}

.owl-eye {
  position: absolute;
  top: 25px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #ffffff;
  border: 2px solid #7564d8;
  display: flex;
  align-items: center;
  justify-content: center;
}

.owl-eye.left {
  left: 13px;
}

.owl-eye.right {
  right: 13px;
  color: #111827;
  font-size: 10px;
  line-height: 10px;
}

.owl-eye.left view {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #111827;
}

.owl-beak {
  position: absolute;
  left: 34px;
  bottom: 18px;
  width: 13px;
  height: 13px;
  background: #facc15;
  border-radius: 50%;
  transform: rotate(45deg);
}

.owl-book {
  position: absolute;
  left: 39px;
  top: 136px;
  width: 94px;
  height: 24px;
  background: #dbeafe;
  border: 1px solid #bfdbfe;
  border-radius: 2px;
  z-index: 3;
}

.owl-book view {
  position: absolute;
  left: 50%;
  top: 0;
  width: 1px;
  height: 100%;
  background: #93c5fd;
}

.upload-panel {
  position: relative;
  min-height: 134px;
  padding: 20px;
  border-radius: 20px;
  background: #fdfcff;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px dashed rgba(161, 138, 245, 0.42);
}

.upload-asset {
  position: relative;
  width: 96px;
  height: 96px;
  margin-left: 8px;
  flex: 0 0 auto;
}

.upload-asset-image {
  position: relative;
  left: -14px;
  top: -15px;
  width: 128px;
  height: 128px;
  display: block;
  opacity: 0.2;
}

.folder-back {
  position: absolute;
  left: 10px;
  bottom: 12px;
  width: 78px;
  height: 62px;
  border-radius: 10px;
  background: #c7d2fe;
  opacity: 0.52;
  transform: rotate(-6deg);
}

.folder-front {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 80px;
  height: 64px;
  border-radius: 14px;
  background: linear-gradient(180deg, #a18af5 0%, #8a6cf2 100%);
  box-shadow: 0 6px 12px rgba(138, 108, 242, 0.22);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.82);
  font-size: 28px;
  padding-top: 16px;
  box-sizing: border-box;
}

.folder-file {
  position: absolute;
  background: #ffffff;
  border-radius: 4px;
  box-shadow: 0 2px 6px rgba(86, 71, 120, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
}

.file-blue {
  left: 14px;
  top: 4px;
  width: 25px;
  height: 32px;
  color: #93c5fd;
  font-size: 14px;
  transform: rotate(-12deg);
}

.file-green {
  right: -8px;
  top: 14px;
  width: 29px;
  height: 29px;
  color: #4ade80;
  font-size: 14px;
  transform: rotate(12deg);
}

.upload-copy {
  flex: 1;
  margin-right: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.upload-hint {
  margin-bottom: 12px;
  color: #888888;
  font-size: 14px;
  line-height: 20px;
}

.upload-button {
  width: 148px;
  height: 48px;
  border-radius: 25px;
  background: linear-gradient(90deg, #9c7eff 0%, #7a5cf0 100%);
  box-shadow: 0 4px 12px rgba(138, 108, 242, 0.3);
  color: #ffffff;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.upload-button-icon {
  font-size: 17px;
  line-height: 17px;
  color: #ffffff;
}

.quick-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 24px;
}

.quick-card {
  height: 72px;
  padding: 16px;
  border-radius: 20px;
  background: #ffffff;
  box-shadow: 0 4px 16px rgba(138, 108, 242, 0.08);
  display: flex;
  align-items: center;
  box-sizing: border-box;
}

.quick-icon,
.report-leading {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.quick-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  margin-right: 11px;
}

.quick-symbol {
  font-size: 22px;
  line-height: 22px;
  font-weight: 800;
}

.sample-icon {
  background: #f1ebff;
  color: #8a6cf2;
}

.reports-icon {
  background: #eaf4ff;
  color: #3b82f6;
}

.quick-label {
  flex: 1;
  color: #333333;
  font-size: 15px;
  line-height: 20px;
  font-weight: 700;
}

.quick-chevron,
.more-chevron,
.row-chevron {
  color: #a18af5;
  font-size: 22px;
  line-height: 22px;
  font-weight: 500;
}

.reports-chevron {
  color: #93c5fd;
}

.recent-card {
  min-height: 226px;
  padding: 20px;
  margin-bottom: 24px;
}

.section-head {
  height: 25px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  color: #252938;
  font-size: 17px;
  line-height: 24px;
  font-weight: 900;
}

.more-link {
  display: flex;
  align-items: center;
  gap: 2px;
  color: #888888;
  font-size: 12px;
  line-height: 18px;
}

.more-chevron {
  color: #b8becb;
  font-size: 17px;
}

.report-row {
  height: 56px;
  display: flex;
  align-items: center;
  width: 100%;
}

.report-leading {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  margin-right: 12px;
  border: 1px solid transparent;
  box-sizing: border-box;
}

.report-leading image {
  width: 26px;
  height: 26px;
}

.report-symbol {
  font-size: 22px;
  line-height: 22px;
  font-weight: 800;
}

.error-icon {
  position: relative;
}

.error-dot {
  position: absolute;
  right: 7px;
  bottom: 7px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fde047;
}

.math-icon {
  background: #eff7ff;
  border-color: #dceeff;
  color: #3b82f6;
}

.error-icon {
  background: #fff1f5;
  border-color: #ffe1ea;
  color: #ec4899;
}

.report-title {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #333333;
  font-size: 15px;
  line-height: 22px;
  font-weight: 600;
}

.report-status {
  flex: 0 0 auto;
  max-width: 105px;
  height: 24px;
  padding: 0 8px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  font-size: 12px;
  line-height: 16px;
  white-space: nowrap;
  overflow: hidden;
}

.status-done {
  color: #16a05d;
  background: #edfff5;
}

.status-pending {
  color: #f19a2a;
  background: #fff7ed;
}

.row-chevron {
  margin-left: 6px;
  color: #d1d5db;
  font-size: 18px;
}

.row-divider {
  height: 1px;
  margin-left: 52px;
  background: #f2f3f7;
}

.bottom-tabs {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 80px;
  padding: 8px 48px 10px;
  background: rgba(255, 255, 255, 0.94);
  border-top: 1px solid #f1f2f6;
  box-sizing: border-box;
  display: none;
  justify-content: space-between;
  z-index: 5;
}

.tab-item {
  width: 72px;
  height: 58px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: #9ca3af;
  font-size: 11px;
  line-height: 14px;
  font-weight: 600;
}

.tab-item.active {
  color: #8a6cf2;
}

.tab-icon {
  width: 24px;
  height: 24px;
}

.auth-mask {
  position: fixed;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  z-index: 60;
  background: rgba(17, 24, 39, 0.38);
  display: flex;
  align-items: flex-end;
}

.auth-mask.preview-hidden {
  display: none;
}

.auth-mask.preview {
  display: none;
}

.auth-sheet {
  width: 100%;
  padding: 21.84px 18.72px calc(19.76px + env(safe-area-inset-bottom));
  border-radius: 17.68px 17.68px 0 0;
  background: #ffffff;
  box-sizing: border-box;
}

.auth-title {
  display: block;
  color: #111827;
  font-size: 17.68px;
  line-height: 22.88px;
  font-weight: 900;
}

.auth-copy {
  display: block;
  margin-top: 9.36px;
  color: #4f5567;
  font-size: 14.04px;
  line-height: 21.84px;
}

.auth-actions {
  margin-top: 17.68px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9.36px;
}

.auth-secondary,
.auth-primary {
  height: 44.72px;
  border-radius: 12.48px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15.08px;
  font-weight: 800;
  text-align: center;
}

.auth-secondary {
  color: #4f5567;
  background: #f2f4f7;
}

.auth-primary {
  color: #ffffff;
  background: #7656f3;
}

  </style>
