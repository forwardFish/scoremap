<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=390, initial-scale=1">
  <title>analysis</title>
  <style>
    html, body { width: 390px; min-height: 844px; margin: 0; overflow: hidden; background: #fff; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    img { max-width: 100%; }
    body {
  min-height: 100%;
  background: #f6f4ff;
}

button {
  margin: 0;
  padding: 0;
  border: 0;
  background: transparent;
  line-height: inherit;
  font: inherit;
  color: inherit;
}

button::after {
  border: 0;
}

.analysis-page {
  position: relative;
  width: 390px;
  min-height: 844px;
  overflow: hidden;
  background: linear-gradient(135deg, #f2f0ff 0%, #fbfdff 100%);
  color: #111c3b;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  box-sizing: border-box;
  padding: 28px 20px 0;
}

.analysis-header {
  height: 48px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.back-button {
  width: 28px;
  height: 44px;
  color: #2d2364;
  font-size: 38px;
  line-height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.robot-icon {
  width: 58px;
  height: 58px;
  border-radius: 0;
  overflow: hidden;
  background: transparent;
  box-shadow: none;
}

.robot-icon image {
  width: 100%;
  height: 100%;
}

.brand-title {
  color: #101946;
  font-size: 22px;
  line-height: 32px;
  font-weight: 900;
}

.analysis-card {
  position: relative;
  height: 614px;
  margin-top: 20px;
  padding: 31px 24px 0;
  border-radius: 24px;
  background: linear-gradient(180deg, #ffffff 0%, #fdfcff 100%);
  box-shadow: 0 10px 35px rgba(123, 97, 255, 0.08);
  box-sizing: border-box;
  overflow: hidden;
}

.card-glow {
  position: absolute;
  left: 58px;
  top: 58px;
  width: 234px;
  height: 234px;
  border-radius: 117px;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.14), rgba(255, 255, 255, 0) 72%);
}

.analysis-title {
  position: relative;
  z-index: 1;
  display: block;
  text-align: center;
  color: #101946;
  font-size: 30px;
  line-height: 42px;
  font-weight: 900;
}

.analysis-title text ,
.analysis-title span {
  color: #8b5cf6;
}

.spark {
  position: absolute;
  z-index: 1;
  color: #c4a7ff;
  font-size: 20px;
}

.sparkle-one {
  left: 69px;
  top: 57px;
}

.sparkle-two {
  right: 82px;
  top: 69px;
}

.sparkle-three {
  right: 62px;
  top: 84px;
  color: #f2c45e;
  font-size: 14px;
}

.progress-stage {
  position: relative;
  height: 258px;
}

.progress-ring {
  position: absolute;
  left: 58px;
  top: 29px;
  width: 190px;
  height: 190px;
}

.ring-track,
.ring-arc {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-sizing: border-box;
}

.ring-track {
  border: 15px solid #eeeaff;
}

.ring-arc {
  border: 15px solid transparent;
  border-top-color: #8e6bff;
  border-right-color: #8e6bff;
}

.arc-top {
  transform: rotate(14deg);
}

.arc-bottom {
  border-top-color: transparent;
  border-right-color: transparent;
  border-bottom-color: #8e6bff;
  border-left-color: #8e6bff;
  transform: rotate(-25deg);
}

.ring-center {
  position: absolute;
  inset: 34px;
  border-radius: 54px;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.progress-number {
  color: #8b5cf6;
  font-size: 54px;
  line-height: 60px;
  font-weight: 900;
}

.percent {
  margin-left: 2px;
  margin-top: 16px;
  color: #8b5cf6;
  font-size: 20px;
  font-weight: 900;
}

.owl {
  position: absolute;
  right: -2px;
  top: 138px;
  width: 132px;
  height: 132px;
  display: block;
}

.step-list {
  position: relative;
  z-index: 1;
  margin: 0 12px;
}

.step-row {
  position: relative;
  height: 49px;
  margin-bottom: 0;
  padding: 0 14px;
  border-radius: 12px;
  background: #ffffff;
  box-shadow: 0 5px 18px rgba(65, 54, 128, 0.06);
  display: flex;
  align-items: center;
  gap: 10px;
  color: #14203f;
  font-size: 14px;
  font-weight: 600;
  box-sizing: border-box;
}

.step-row::after {
  content: "";
  position: absolute;
  left: 22px;
  bottom: -8px;
  width: 2px;
  height: 10px;
  border-left: 2px dotted #d6d4ff;
}

.step-row:last-child::after {
  display: none;
}

.step-node {
  width: 24px;
  height: 24px;
  border-radius: 12px;
  background: #64c992;
  color: #ffffff;
  font-size: 15px;
  line-height: 24px;
  text-align: center;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
}

.step-node image {
  width: 24px;
  height: 24px;
  display: block;
}

.active .step-node {
  background: #f3efff;
  border: 2px dotted #8b5cf6;
  box-sizing: border-box;
  animation: analysis-spin 1.2s linear infinite;
}

.pending .step-node {
  background: #eee9ff;
  color: #8b5cf6;
  font-size: 13px;
}

.pending {
  color: #8a91a4;
  font-weight: 500;
}

.estimate {
  height: 28px;
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  color: #8c93a4;
  font-size: 12px;
}

.clock-icon {
  width: 16px;
  height: 16px;
  display: block;
}

.primary-button {
  position: absolute;
  left: 28px;
  top: 724px;
  width: 334px;
  height: 60px;
  border-radius: 30px;
  background: linear-gradient(90deg, #a687ff 0%, #7b61ff 100%);
  color: #ffffff;
  font-size: 20px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 7px 18px rgba(123, 97, 255, 0.22);
}

.refresh-button {
  position: absolute;
  left: 130px;
  top: 794px;
  width: 130px;
  height: 34px;
  color: #8b5cf6;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.refresh-icon {
  width: 18px;
  height: 18px;
  display: block;
}

.refresh-button.refreshing {
  opacity: 0.72;
}

.analysis-toast {
  position: absolute;
  left: 48px;
  right: 48px;
  top: 686px;
  color: #8a6cf2;
  font-size: 12px;
  line-height: 18px;
  text-align: center;
}

@keyframes analysis-spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

  </style>
</head>
