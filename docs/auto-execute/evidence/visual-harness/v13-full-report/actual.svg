<svg xmlns="urn:scoremap:local-svg" width="390" height="844" viewBox="0 0 390 844">  <rect width="390" height="844" fill="#f5f7fb"/>  <text x="28" y="72" font-size="23" font-weight="700" fill="#111827">完整提分报告</text>  <rect x="18" y="96" width="354" height="138" rx="24" fill="#ffffff" stroke="#ebe6f2"/>  <text x="42" y="134" font-size="24" font-weight="700" fill="#1c1b23">初一数学月考提分报告</text>  <text x="42" y="166" font-size="12" fill="#474554">整体基础较好，计算粗心和几何证明步骤不完整是本次失分的主要原因。</text>  <rect x="42" y="184" width="108" height="24" rx="12" fill="#e6f5ea"/>  <text x="54" y="200" font-size="10" font-weight="700" fill="#006a35">完整分析已生成</text>  <text x="42" y="260" font-size="16" font-weight="700" fill="#1c1b23">报告内容</text>  <rect x="28" y="244" width="334" height="60" rx="16" fill="#ffffff" stroke="#ebe6f2"/>  <circle cx="58" cy="274" r="18" fill="#e5deff"/>  <text x="88" y="268" font-size="13" font-weight="700" fill="#1c1b23">主要丢分点</text>  <text x="88" y="288" font-size="10" fill="#474554">计算失误、几何证明步骤缺失、应用题等量关系不清。</text><rect x="28" y="318" width="334" height="60" rx="16" fill="#ffffff" stroke="#ebe6f2"/>  <circle cx="58" cy="348" r="18" fill="#e5deff"/>  <text x="88" y="342" font-size="13" font-weight="700" fill="#1c1b23">优先补弱顺序</text>  <text x="88" y="362" font-size="10" fill="#474554">先补几何证明表达，再巩固方程应用题和计算检查。</text><rect x="28" y="392" width="334" height="60" rx="16" fill="#ffffff" stroke="#ebe6f2"/>  <circle cx="58" cy="422" r="18" fill="#e5deff"/>  <text x="88" y="416" font-size="13" font-weight="700" fill="#1c1b23">7 天建议</text>  <text x="88" y="436" font-size="10" fill="#474554">每天 20 分钟错题复盘，隔天完成同类题迁移练习。</text>  <text x="42" y="486" font-size="16" font-weight="700" fill="#1c1b23">错题提分</text>  <rect x="28" y="506" width="334" height="94" rx="20" fill="#ffffff" stroke="#ebe6f2"/>  <rect x="28" y="506" width="5" height="94" rx="2" fill="#fc9d41"/>  <text x="48" y="534" font-size="13" font-weight="700" fill="#1c1b23">错题 1 二元一次方程应用题</text>  <text x="48" y="556" font-size="10" fill="#474554">甲、乙两人同时从 A 地出发，甲每小时行 60km，乙每小时行 50km，3 小时后甲比乙多行多少千米？</text>  <rect x="194" y="570" width="138" height="24" rx="12" fill="#5a45cb"/>  <text x="207" y="586" font-size="9" font-weight="700" fill="#ffffff">让 AI 老师讲给孩子听</text><rect x="28" y="620" width="334" height="94" rx="20" fill="#ffffff" stroke="#ebe6f2"/>  <rect x="28" y="620" width="5" height="94" rx="2" fill="#5a45cb"/>  <text x="48" y="648" font-size="13" font-weight="700" fill="#1c1b23">错题 2 几何证明题</text>  <text x="48" y="670" font-size="10" fill="#474554">已知 AB=AC，点 D 在 BC 上且 BD=CD，求证：∠BAD = ∠CAD。</text>  <rect x="194" y="684" width="138" height="24" rx="12" fill="#5a45cb"/>  <text x="207" y="700" font-size="9" font-weight="700" fill="#ffffff">让 AI 老师讲给孩子听</text>  <rect x="18" y="760" width="108" height="44" rx="14" fill="#5a45cb"/>  <text x="48" y="788" font-size="12" font-weight="700" fill="#ffffff">分享报告</text>  <rect x="140" y="760" width="108" height="44" rx="14" fill="#ffffff" stroke="#5a45cb"/>  <text x="170" y="788" font-size="12" font-weight="700" fill="#5a45cb">保存报告</text>  <rect x="262" y="760" width="108" height="44" rx="14" fill="#ffffff" stroke="#5a45cb"/>  <text x="292" y="788" font-size="12" font-weight="700" fill="#5a45cb">导出 PDF</text></svg>