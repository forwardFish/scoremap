  <rect x="36" y="208" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="234" font-size="13" font-weight="700" fill="#111827">1. Knowledge diagnosis</text><text x="56" y="254" font-size="11" fill="#6b7280">Calculation rules and formula usage need staged practice.</text><rect x="36" y="278" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="304" font-size="13" font-weight="700" fill="#111827">2. Per-question loss point breakdown</text><text x="56" y="324" font-size="11" fill="#6b7280">Mark the missing condition, formula, solving process, and final verification.</text><rect x="36" y="348" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="374" font-size="13" font-weight="700" fill="#111827">3. 7-day score improvement plan</text><text x="56" y="394" font-size="11" fill="#6b7280">Three correction reviews, two targeted exercise days, and one final mistake-book review.</text><rect x="36" y="418" width="318" height="54" rx="12" fill="#ffffff" stroke="#e5e7eb"/><text x="56" y="444" font-size="13" font-weight="700" fill="#111827">4. Parent guidance</text><text x="56" y="464" font-size="11" fill="#6b7280">Use process feedback and avoid guaranteed-score promises.</text>
  <rect x="28" y="642" width="334" height="52" rx="20" fill="#2563eb"/>
