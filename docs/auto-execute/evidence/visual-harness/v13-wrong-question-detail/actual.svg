<svg xmlns="urn:scoremap:local-svg" width="390" height="844" viewBox="0 0 390 844">  <rect width="390" height="844" fill="#fdf8ff"/>  <text x="54" y="56" font-size="20" font-weight="700" fill="#5a45cb">教育提分报告</text>  <text x="28" y="92" font-size="13" fill="#474554">错题 1 / 8</text>  <rect x="18" y="116" width="354" height="580" rx="16" fill="#ffffff" stroke="#c9c4d6"/>  <rect x="42" y="142" width="58" height="28" rx="8" fill="#7360e5"/>  <text x="54" y="161" font-size="11" font-weight="700" fill="#ffffff">错题 1</text>  <rect x="110" y="142" width="156" height="28" rx="8" fill="#f1ecf8"/>  <text x="122" y="161" font-size="10" font-weight="700" fill="#5a45cb">方程应用题</text>  <rect x="286" y="142" width="58" height="28" rx="8" fill="#ffdad6"/>  <text x="298" y="161" font-size="10" font-weight="700" fill="#93000a">未掌握</text>  <rect x="42" y="186" width="4" height="24" rx="2" fill="#5a45cb"/>  <text x="54" y="206" font-size="15" font-weight="700" fill="#1c1b23">原题</text>  <text x="42" y="236" font-size="12" fill="#474554">甲、乙两人同时从 A 地出发，甲每小时行 60km，乙每小时行 50km，3 小时后甲比乙多行多少千米？</text>  <rect x="42" y="276" width="306" height="70" rx="12" fill="#f9f9f9" stroke="#c9c4d6"/>  <text x="50" y="302" font-size="15" font-weight="700" fill="#1c1b23">学生作答</text>  <text x="50" y="326" font-size="12" fill="#474554">学生列式为 60 + 50 = 110，混淆了速度和路程差。</text>  <text x="42" y="388" font-size="15" font-weight="700" fill="#1c1b23">正确答案</text>  <text x="42" y="414" font-size="15" font-weight="700" fill="#5a45cb">20 千米</text>  <text x="198" y="388" font-size="15" font-weight="700" fill="#1c1b23">知识点</text>  <text x="198" y="414" font-size="12" fill="#474554">方程应用题</text>  <rect x="42" y="450" width="306" height="82" rx="16" fill="#f7f1fd"/>  <text x="58" y="478" font-size="15" font-weight="700" fill="#1c1b23">错因诊断</text>  <text x="58" y="504" font-size="12" fill="#474554">没有把“甲比乙多行”理解为两人的路程差，漏掉了“速度差 × 时间”的关系。</text>  <text x="42" y="574" font-size="15" font-weight="700" fill="#1c1b23">讲解摘要</text>  <text x="42" y="602" font-size="12" fill="#474554">本题关键是先求速度差：60 - 50 = 10km/h，再乘以 2 小时，得到 20 千米。</text>  <circle cx="318" cy="604" r="32" fill="#e5deff"/>  <text x="302" y="612" font-size="18" font-weight="800" fill="#442bb5">AI</text>  <rect x="42" y="646" width="306" height="42" rx="16" fill="#5a45cb"/>  <text x="104" y="673" font-size="14" font-weight="700" fill="#ffffff">让 AI 老师讲给孩子听</text>  <rect x="18" y="716" width="354" height="64" rx="16" fill="#ebe6f2"/>  <text x="42" y="746" font-size="15" font-weight="700" fill="#1c1b23">本题互动记录 (1)</text>  <text x="42" y="768" font-size="11" fill="#474554">AI 已讲解：先比较速度差，再乘以时间。</text>  <rect x="18" y="804" width="108" height="34" rx="14" fill="#ffffff" stroke="#c9c4d6"/>  <text x="50" y="826" font-size="11" font-weight="700" fill="#474554">分享报告</text>  <rect x="141" y="804" width="108" height="34" rx="14" fill="#7360e5"/>  <text x="176" y="826" font-size="11" font-weight="700" fill="#ffffff">AI 提分</text>  <rect x="264" y="804" width="108" height="34" rx="14" fill="#ffffff" stroke="#c9c4d6"/>  <text x="296" y="826" font-size="11" font-weight="700" fill="#474554">导出 PDF</text></svg>