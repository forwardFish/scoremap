<svg xmlns="urn:scoremap:local-svg" width="390" height="844" viewBox="0 0 390 844">  <rect width="390" height="844" fill="#fdf8ff"/>  <text x="54" y="58" font-size="20" font-weight="800" fill="#5a45cb">答题反馈</text>  <rect x="18" y="94" width="354" height="146" rx="24" fill="#eef8f0" stroke="#9fd6aa"/>  <text x="42" y="142" font-size="34" font-weight="800" fill="#006d38">✓</text>  <text x="92" y="142" font-size="22" font-weight="800" fill="#1c1b23">回答正确</text>  <text x="92" y="176" font-size="12" fill="#474554">你的答案：36 千米</text>  <text x="92" y="204" font-size="12" fill="#474554">正确答案：36 千米</text>  <rect x="18" y="270" width="354" height="210" rx="24" fill="#ffffff" stroke="#ebe6f2"/>  <text x="42" y="312" font-size="17" font-weight="800" fill="#1c1b23">AI 讲评</text>  <text x="42" y="350" font-size="12" fill="#474554">你先算出每小时多走 12 千米，再乘以 3 小时，数量关系抓对了。</text>  <text x="42" y="410" font-size="13" font-weight="700" fill="#5a45cb">同类题迁移已掌握。</text>  <rect x="18" y="506" width="354" height="66" rx="18" fill="#ffffff" stroke="#ebe6f2"/>  <text x="42" y="548" font-size="15" font-weight="800" fill="#1c1b23">本题追问记录</text>  <rect x="18" y="618" width="166" height="54" rx="18" fill="#ffffff" stroke="#5a45cb"/>  <text x="72" y="652" font-size="14" font-weight="800" fill="#5a45cb">再练一题</text>  <rect x="206" y="618" width="166" height="54" rx="18" fill="#5a45cb"/>  <text x="260" y="652" font-size="14" font-weight="800" fill="#ffffff">返回报告</text>  <rect x="0" y="776" width="390" height="68" fill="#ffffff" stroke="#ebe6f2"/>  <text x="54" y="818" font-size="12" fill="#777383">报告</text>  <text x="170" y="818" font-size="12" font-weight="800" fill="#5a45cb">AI 提分</text>  <text x="294" y="818" font-size="12" fill="#777383">原错题</text></svg>