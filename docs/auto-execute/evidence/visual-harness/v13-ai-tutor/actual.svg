<svg xmlns="urn:scoremap:local-svg" width="390" height="844" viewBox="0 0 390 844">  <rect width="390" height="844" fill="#fdf8ff"/>  <text x="118" y="42" font-size="20" font-weight="700" fill="#5a45cb">教育提分报告</text>  <text x="116" y="64" font-size="13" fill="#5a45cb">你还可以追问 3 次</text>  <rect x="18" y="92" width="354" height="326" rx="24" fill="#ffffff" stroke="#e5deff"/>  <rect x="42" y="120" width="64" height="64" rx="20" fill="#e5deff"/>  <text x="61" y="160" font-size="22" font-weight="800" fill="#442bb5">AI</text>  <rect x="120" y="120" width="222" height="104" rx="18" fill="#f7f1fd"/>  <text x="136" y="150" font-size="12" fill="#1c1b23">我来帮你再梳理这道题。你可以先选择一个固定问题，我会只围绕当前错题讲解。</text>  <rect x="30" y="252" width="104" height="70" rx="16" fill="#f7f1fd" stroke="#c9c4d6"/>  <text x="42" y="290" font-size="11" font-weight="700" fill="#1c1b23">我不懂这一步</text><rect x="144" y="252" width="104" height="70" rx="16" fill="#f7f1fd" stroke="#c9c4d6"/>  <text x="156" y="290" font-size="11" font-weight="700" fill="#1c1b23">为什么这样算</text><rect x="258" y="252" width="104" height="70" rx="16" fill="#f7f1fd" stroke="#c9c4d6"/>  <text x="270" y="290" font-size="11" font-weight="700" fill="#1c1b23">换一种方式讲</text><rect x="30" y="334" width="218" height="58" rx="16" fill="#f7f1fd" stroke="#c9c4d6"/>  <text x="42" y="372" font-size="11" font-weight="700" fill="#1c1b23">出一道同类题</text><rect x="258" y="334" width="104" height="58" rx="16" fill="#008645" stroke="#c9c4d6"/>  <text x="270" y="372" font-size="11" font-weight="700" fill="#f6fff4">我已经懂了</text>  <rect x="18" y="442" width="354" height="214" rx="22" fill="#ffffff" stroke="#c9c4d6"/>  <text x="42" y="482" font-size="16" font-weight="700" fill="#1c1b23">错题信息</text>  <text x="320" y="482" font-size="16" fill="#787585">⌃</text>  <rect x="42" y="506" width="54" height="24" rx="7" fill="#fff0df"/>  <text x="52" y="522" font-size="10" font-weight="700" fill="#8f4e00">应用题</text>  <text x="108" y="522" font-size="13" font-weight="700" fill="#1c1b23">方程应用题</text>  <rect x="42" y="546" width="306" height="86" rx="16" fill="#f7f1fd"/>  <text x="58" y="574" font-size="12" fill="#474554">甲、乙两人同时从 A 地出发，甲每小时行 60km，乙每小时行 50km，3 小时后甲比乙多行多少千米？</text>  <text x="58" y="604" font-size="12" font-weight="700" fill="#5a45cb">x = (60 - 50) x 2 / x = 10 x 2 / x = 20 千米</text>  <rect x="18" y="680" width="354" height="64" rx="20" fill="#ffffff" stroke="#e5deff"/>  <text x="42" y="718" font-size="15" font-weight="700" fill="#1c1b23">本题互动记录 (2)</text>  <text x="328" y="718" font-size="18" fill="#787585">›</text>  <text x="102" y="772" font-size="12" fill="#787585">内容由 AI 生成，仅供学习参考</text>  <rect x="18" y="804" width="108" height="34" rx="14" fill="#ffffff" stroke="#c9c4d6"/>  <text x="50" y="826" font-size="11" font-weight="700" fill="#474554">分享报告</text>  <rect x="141" y="804" width="108" height="34" rx="14" fill="#7360e5"/>  <text x="176" y="826" font-size="11" font-weight="700" fill="#ffffff">AI 提分</text>  <rect x="264" y="804" width="108" height="34" rx="14" fill="#ffffff" stroke="#c9c4d6"/>  <text x="296" y="826" font-size="11" font-weight="700" fill="#474554">导出 PDF</text></svg>