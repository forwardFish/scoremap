<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>处理失败</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
<style data-purpose="custom-utilities">
    .bg-gradient-primary {
      background: linear-gradient(135deg, #A88BFA 0%, #7C3AED 100%);
    }
    .text-gradient-primary {
      background: linear-gradient(135deg, #A88BFA 0%, #7C3AED 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .shadow-soft {
      box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.2), 0 8px 10px -6px rgba(124, 58, 237, 0.1);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-start pb-8">
<!-- BEGIN: Header -->
<header class="w-full max-w-md px-4 py-5 flex items-center bg-transparent z-10 sticky top-0">
<button aria-label="返回" class="p-2 -ml-2 text-slate-800 hover:text-slate-600 transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<h1 class="flex-1 text-center text-lg font-semibold text-slate-800 mr-8">处理失败</h1>
</header>
<!-- END: Header -->
<!-- BEGIN: MainContent -->
<main class="flex-1 w-full max-w-md px-4 flex flex-col">
<div class="bg-white rounded-3xl shadow-sm border border-slate-100 flex-1 flex flex-col p-6 mt-2 relative overflow-hidden">
<!-- Background subtle glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[150%] h-64 bg-indigo-50/50 rounded-[100%] -translate-y-1/2 blur-2xl pointer-events-none"></div>
<!-- Illustration Area -->
<div class="w-full flex justify-center items-center mt-12 mb-8 relative z-10">
<!-- Using the provided image directly as it contains the specific illustration -->
<img alt="分析失败插画：沮丧的猫头鹰和带叉的文件" class="w-full h-auto object-cover max-w-[280px]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBptY0RY3OFDf9DxnqaItSPBvbCXV1qoiEdCk99NcMdEkd_e0WbrYPalrt_f9tR4qj0FHF7hm0qD77YQJi1mViNgehF-Pz_RPCi5f-PVXoz6QJHOecA48ufxxD8_E2neUAz-Ob_IdM7QFbL85NZARc7htwzpBDaH9IO8PHKuO0OCIgKtd8ERMBOjfsvsNWcYXr-WO9zVN0myKmsYAIs_cXV_3gYWwuwgK4LAFKT5kb0IbEYxDxKlNgxN9Ksyyu2rliATwcvii6TmGPk" style="clip-path: inset(18% 10% 45% 10%); margin-top: -15%; margin-bottom: -40%;"/>
</div>
<!-- Text Content -->
<div class="text-center mt-6 z-10">
<h2 class="text-2xl font-bold text-slate-800 mb-3 tracking-tight">分析没有成功</h2>
<p class="text-sm text-slate-500 leading-relaxed max-w-[260px] mx-auto">
          可能是资料不清晰或网络异常，请稍后重试。
        </p>
</div>
<!-- Actions Area -->
<div class="mt-auto pt-10 flex flex-col gap-4 z-10 w-full">
<!-- Primary Button -->
<button class="w-full bg-gradient-primary hover:opacity-90 transition-opacity text-white font-medium text-base py-3.5 rounded-2xl shadow-soft flex justify-center items-center">
          重新开始分析
        </button>
<!-- Secondary Button -->
<button class="w-full bg-white border border-indigo-200 hover:bg-indigo-50 transition-colors text-indigo-500 font-medium text-base py-3.5 rounded-2xl flex justify-center items-center">
          重新上传资料
        </button>
<!-- Tertiary Link -->
<button class="mt-4 flex items-center justify-center gap-1 text-sm text-indigo-500 hover:text-indigo-600 transition-colors font-medium">
          返回首页
          <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</div>
</main>

</body></html>
