<script>
        function selectOption(el) {
            // Clear others
            const allOptions = document.querySelectorAll('#options-container button');
            allOptions.forEach(opt => {
                opt.classList.remove('option-chip-active', 'border-primary');
                opt.classList.add('border-transparent');
                const label = opt.querySelector('span:first-child');
                label.classList.remove('bg-primary', 'text-on-primary');
                label.classList.add('bg-surface', 'text-primary');
            });

            // Select clicked
            el.classList.add('option-chip-active', 'border-primary');
            el.classList.remove('border-transparent');
            const label = el.querySelector('span:first-child');
            label.classList.remove('bg-surface', 'text-primary');
            label.classList.add('bg-primary', 'text-on-primary');

            // Haptic-like feedback via scale
            el.style.transform = "scale(0.98)";
            setTimeout(() => {
                el.style.transform = "scale(1.02)";
            }, 100);
        }

        // Simple mascot interaction
        const mascotTrigger = document.querySelector('h2');
        mascotTrigger.addEventListener('mouseover', () => {
            const bulb = mascotTrigger.previousElementSibling;
            bulb.style.transform = "scale(1.2) rotate(15deg)";
            bulb.style.transition = "transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        });
        mascotTrigger.addEventListener('mouseout', () => {
            const bulb = mascotTrigger.previousElementSibling;
            bulb.style.transform = "scale(1) rotate(0deg)";
        });
    </script>
