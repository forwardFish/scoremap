<script>
        // Simple micro-interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 150);
            });
        });

        // Atmospheric effect: gentle floating of the mascot image
        const mascot = document.querySelector('img[data-alt*="owl mascot"]');
        if (mascot) {
            let angle = 0;
            setInterval(() => {
                angle += 0.05;
                const yOffset = Math.sin(angle) * 5;
                mascot.style.transform = `translateY(${yOffset}px)`;
            }, 30);
        }
    </script>
