<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>AI提分教练</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              light: '#f5f7ff',
              primary: '#8b5cf6',
              secondary: '#a78bfa',
              text: '#1e293b',
              muted: '#64748b'
            }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    /* Custom animations and specific styles */
    .bg-gradient-main {
      background: linear-gradient(135deg, #f0f4ff 0%, #fcfdff 100%);
    }
    .card-shadow {
      box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.1);
    }
    .progress-ring {
      transition: stroke-dashoffset 0.5s ease-in-out;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    .spin-slow {
      animation: spin 3s linear infinite;
    }
    .pulse-slow {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .step-line {
      position: absolute;
      left: 11px;
      top: 24px;
      bottom: -8px;
      width: 2px;
      background-image: linear-gradient(to bottom, #d8b4fe 50%, transparent 50%);
      background-size: 100% 8px;
      z-index: 0;
    }
    .step-line.last {
      display: none;
    }
  </style>
</head>
<body class="bg-gradient-main min-h-screen text-brand-text font-sans antialiased flex flex-col items-center">
<!-- Mobile Container -->
<div class="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-purple-100/50 to-transparent -z-10"></div>
<!-- BEGIN: MainHeader -->
<header class="flex items-center justify-between px-4 py-4 mt-2">
<button aria-label="Go back" class="p-2 text-brand-text">
<i class="fas fa-chevron-left text-lg"></i>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm overflow-hidden">
<i class="fas fa-robot text-brand-primary text-xl"></i>
</div>
<h1 class="text-lg font-bold">AI提分教练</h1>
</div>
<div class="w-8"></div> <!-- Placeholder for balance -->
</header>
<!-- END: MainHeader -->
<!-- BEGIN: Main Content Area -->
<main class="flex-1 px-4 pb-8 flex flex-col">
<!-- Main Card -->
<div class="bg-white rounded-3xl p-6 mt-2 card-shadow relative flex-1 flex flex-col">
<!-- Header Text -->
<div class="text-center mb-6 relative">
<!-- Sparkles -->
<i class="fas fa-star absolute top-0 left-8 text-yellow-300 text-xs opacity-70"></i>
<i class="fas fa-star absolute top-2 right-12 text-yellow-300 text-xs opacity-70"></i>
<i class="fas fa-star absolute bottom-0 left-16 text-purple-300 text-xs opacity-70"></i>
<i class="fas fa-star absolute -bottom-2 right-8 text-purple-300 text-xs opacity-70"></i>
<h2 class="text-2xl font-bold text-gray-800 tracking-wide flex items-center justify-center gap-1">
<span class="text-brand-primary text-3xl">AI</span> 正在分析中
          </h2>
</div>
<!-- Progress Indicator -->
<div class="relative flex justify-center mb-8 h-48 items-center">
<!-- SVG Circular Progress -->
<svg class="w-48 h-48" viewbox="0 0 100 100">
<!-- Background circle -->
<circle class="text-purple-100 stroke-current" cx="50" cy="50" fill="transparent" r="40" stroke-width="8"></circle>
<!-- Progress circle (68%) -->
<circle class="text-brand-primary stroke-current progress-ring" cx="50" cy="50" fill="transparent" r="40" stroke-dasharray="251.2" stroke-dashoffset="80.384" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<!-- Percentage Text -->
<div class="absolute flex items-baseline">
<span class="text-5xl font-bold text-brand-primary tracking-tighter">68</span>
<span class="text-2xl font-bold text-brand-primary ml-1">%</span>
</div>
<!-- Mascot Decoration (Placeholder) -->
<div class="absolute -right-2 -bottom-4 w-24 h-24">
<div class="w-full h-full bg-purple-200 rounded-full flex items-center justify-center shadow-lg relative overflow-hidden">
<i class="fas fa-graduation-cap text-gray-800 text-2xl absolute top-2 right-4 transform rotate-12 z-10"></i>
<i class="fas fa-glasses text-gray-800 text-3xl absolute z-10"></i>
<div class="w-16 h-16 bg-purple-300 rounded-full"></div>
</div>
</div>
</div>
<!-- Status List -->
<div class="flex-1 space-y-3 relative px-2">
<!-- Step 1 -->
<div class="flex items-start relative z-10 bg-gray-50/50 rounded-xl p-3">
<div class="step-line"></div>
<div class="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-400 flex items-center justify-center text-white mr-3 z-10">
<i class="fas fa-check text-xs"></i>
</div>
<p class="text-sm font-medium text-gray-700">已识别上传资料</p>
</div>
<!-- Step 2 -->
<div class="flex items-start relative z-10 bg-gray-50/50 rounded-xl p-3">
<div class="step-line"></div>
<div class="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-400 flex items-center justify-center text-white mr-3 z-10">
<i class="fas fa-check text-xs"></i>
</div>
<p class="text-sm font-medium text-gray-700">已匹配年级与学科</p>
</div>
<!-- Step 3 -->
<div class="flex items-start relative z-10 bg-gray-50/50 rounded-xl p-3">
<div class="step-line"></div>
<div class="flex-shrink-0 w-6 h-6 rounded-full border-2 border-brand-secondary border-dashed flex items-center justify-center mr-3 z-10 bg-white">
<div class="w-3 h-3 bg-brand-primary rounded-full pulse-slow"></div>
</div>
<p class="text-sm font-medium text-gray-800">正在定位主要丢分点</p>
</div>
<!-- Step 4 -->
<div class="flex items-start relative z-10 bg-gray-50/50 rounded-xl p-3">
<div class="step-line last"></div>
<div class="flex-shrink-0 w-6 h-6 rounded-full bg-brand-light flex items-center justify-center text-brand-secondary mr-3 z-10">
<i class="fas fa-hourglass-half text-xs"></i>
</div>
<p class="text-sm font-medium text-brand-muted">正在生成初步建议</p>
</div>
</div>
<!-- Time Estimate -->
<div class="mt-6 flex items-center justify-center text-xs text-brand-muted gap-1">
<i class="far fa-clock"></i>
<span>通常需要10-30秒</span>
</div>
</div>
<!-- End Main Card -->
<!-- Action Buttons -->
<div class="mt-6 space-y-4 px-2">
<button class="w-full bg-gradient-to-r from-brand-secondary to-brand-primary text-white font-medium py-3.5 rounded-full shadow-md shadow-brand-primary/20 active:opacity-90 transition-opacity flex items-center justify-center text-lg tracking-wide">
          稍后查看
        </button>
<button class="w-full flex items-center justify-center gap-2 text-brand-primary font-medium py-2 active:opacity-70 transition-opacity">
<i class="fas fa-sync-alt text-sm spin-slow"></i>
<span class="text-sm">刷新进度</span>
</button>
</div>
</main>
<!-- END: Main Content Area -->
</div>
</body></html>
